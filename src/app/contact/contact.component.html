<section id="contacto" class="contact-section">
  <div class="container">
    <div class="contact-grid">
      <div class="contact-left">
        <span class="section-label">Contáctanos</span>
        <h2 class="section-title">Pide tu agua hoy</h2>
        <p class="section-subtitle" style="color: rgba(255,255,255,0.7)">
          Escríbenos o llámanos. Atendemos pedidos con entrega el mismo día en toda el Área Metropolitana.
        </p>

        <div class="contact-cards">
          <a *ngFor="let c of contacts" [href]="c.href" target="_blank" class="contact-card">
            <div class="contact-card-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.118 1.529 5.843L.057 23.716a.5.5 0 0 0 .614.635l6.04-1.587A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a9.956 9.956 0 0 1-5.116-1.412l-.367-.219-3.8 1.003.99-3.668-.24-.378A9.977 9.977 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
              </svg>
            </div>
            <div>
              <span class="contact-label">{{ c.label }}</span>
              <span class="contact-value">{{ c.value }}</span>
            </div>
          </a>
        </div>
      </div>

      <div class="contact-right">
        <div class="form-card" *ngIf="!sent">
          <h3>Solicitar pedido</h3>
          <div class="form-group">
            <label>Nombre completo</label>
            <input type="text" [(ngModel)]="form.name" placeholder="¿Cómo te llamamos?">
          </div>
            <div class="form-group">
              <label>Teléfono</label>
              <input type="tel" [(ngModel)]="form.phone" placeholder="+57 300 000 0000">
            </div>
          <div class="form-group">
            <label>Producto de interés</label>
            <select [(ngModel)]="form.product">
              <option value="">¿Qué necesitas?</option>
              <option>Botellón 20L</option>
              <option>Botella 600ml</option>
            </select>
          </div>
          <button class="submit-btn" (click)="submit()">
            Enviar Solicitud
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>

        <div class="form-card success-state" *ngIf="sent">
          <div class="success-icon">💧</div>
          <h3>¡Solicitud enviada!</h3>
          <p>Gracias, <strong>{{ form.name }}</strong>. Nos comunicaremos contigo al {{ form.phone }} a la brevedad posible.</p>
          <button class="submit-btn" (click)="sent = false; form = {name:'',phone:'',city:'',product:''}">Nuevo pedido</button>
        </div>
      </div>
    </div>
  </div>
</section>
