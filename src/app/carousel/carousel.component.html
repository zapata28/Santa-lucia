<section id="hero" class="hero">
  <div class="slides-container">
    <div
      *ngFor="let slide of slides; let i = index"
      class="slide"
      [class.active]="i === current"
      [ngClass]="slide.bg">
      <div class="slide-inner">
        <div class="slide-image">
          <img [src]="slide.img" [alt]="slide.tag">
        </div>
        <div class="slide-content">
          <span class="tag">{{ slide.tag }}</span>
          <h1>{{ slide.title }}</h1>
          <p>{{ slide.subtitle }}</p>
          <button class="cta-btn" (click)="scrollTo('productos')">
            {{ slide.cta }}
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <button class="arrow arrow-left" (click)="prev()" aria-label="Anterior">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </button>
  <button class="arrow arrow-right" (click)="next()" aria-label="Siguiente">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M9 18l6-6-6-6"/>
    </svg>
  </button>

  <div class="dots">
    <button
      *ngFor="let slide of slides; let i = index"
      class="dot"
      [class.active]="i === current"
      (click)="goTo(i)"
      [attr.aria-label]="'Slide ' + (i+1)">
    </button>
  </div>

  <div class="stats-bar">
    <div class="stat"><strong>+10 años</strong><span>de experiencia</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><strong>100% natural</strong><span>de manantial</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><strong>+10.000</strong><span>clientes activos</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><strong>Certificado</strong><span>INVIMA</span></div>
  </div>
</section>
